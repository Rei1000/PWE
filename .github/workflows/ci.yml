name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify project layout
        run: |
          for d in \
            docs \
            prompts/agent \
            backend/src/domain \
            backend/src/application \
            backend/src/ports \
            backend/src/adapters \
            backend/src/api \
            frontend/web \
            frontend/mobile \
            infra \
            .goldstandard
          do
            if [ ! -d "$d" ]; then
              echo "Missing required directory: $d"
              exit 1
            fi
          done
          echo "Layout OK"

      - name: Verify required documentation
        run: |
          for f in \
            docs/pflichtenheft.md \
            docs/architecture.md \
            docs/projectstructure.md \
            docs/projektrules.md \
            docs/datenbankmodell.md \
            .goldstandard/context.txt
          do
            if [ ! -f "$f" ]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done
          echo "Documentation OK"

      - name: Set up Node
        if: hashFiles('frontend/web/package.json') != '' || hashFiles('frontend/mobile/package.json') != '' || hashFiles('frontend/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------- FRONTEND (optional, when package.json exists) ----------

      - name: Install frontend deps
        if: hashFiles('frontend/web/package.json') != '' || hashFiles('frontend/mobile/package.json') != '' || hashFiles('frontend/package.json') != ''
        run: |
          for dir in frontend/web frontend/mobile frontend; do
            if [ -f "$dir/package.json" ]; then
              echo "Installing dependencies in $dir"
              (cd "$dir" && npm install)
            fi
          done

      - name: Run frontend lint
        if: hashFiles('frontend/web/package.json') != '' || hashFiles('frontend/mobile/package.json') != '' || hashFiles('frontend/package.json') != ''
        run: |
          for dir in frontend/web frontend/mobile frontend; do
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && if npm run 2>/dev/null | grep -q "lint"; then npm run lint; else echo "No lint script in $dir, skipping"; fi)
            fi
          done

      # ---------- BACKEND (optional, when Python project setup exists) ----------

      - name: Set up Python
        if: hashFiles('backend/requirements.txt') != '' || hashFiles('backend/pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        if: hashFiles('backend/requirements.txt') != ''
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Install backend deps (pyproject)
        if: hashFiles('backend/pyproject.toml') != ''
        run: |
          cd backend
          pip install .
          pip install pytest httpx

      - name: Run backend tests
        if: hashFiles('backend/requirements.txt') != '' || hashFiles('backend/pyproject.toml') != ''
        run: |
          cd backend
          python -m pytest
